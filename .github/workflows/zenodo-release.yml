name: Zenodo DOI Registration

on:
  release:
    types: [published]

concurrency:
  group: zenodo-${{ github.repository }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  register-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Zenodo webhook
        run: sleep 90

      - name: Poll Zenodo for DOI
        id: zenodo
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${{ github.repository }}"
          echo "Searching Zenodo for: $REPO_URL"

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt..."
            RESPONSE=$(curl -s "https://zenodo.org/api/records?q=related_identifier:$REPO_URL&sort=mostrecent&size=1")
            DOI=$(echo "$RESPONSE" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    hits = data.get('hits', {}).get('hits', [])
    if hits:
        doi = hits[0].get('doi') or hits[0].get('metadata', {}).get('doi', '')
        print(doi)
except:
    pass
" 2>/dev/null || echo "")

            if [ -n "$DOI" ]; then
              echo "doi=$DOI" >> $GITHUB_OUTPUT
              echo "Found DOI: $DOI"
              break
            fi

            echo "DOI not found yet, waiting 60s..."
            sleep 60
          done

      - name: Update CITATION.cff
        if: steps.zenodo.outputs.doi != ''
        run: |
          set -euo pipefail
          DOI="${{ steps.zenodo.outputs.doi }}"
          VERSION="${{ github.event.release.tag_name }}"
          DATE=$(date +%Y-%m-%d)

          python3 - <<'PY' "$DOI" "$VERSION" "$DATE"
import pathlib
import re
import sys

doi, version, date = sys.argv[1:]
path = pathlib.Path("CITATION.cff")

if path.exists():
    content = path.read_text(encoding="utf-8")
    updates = {
        "doi": doi,
        "version": version,
        "date-released": date,
    }
    for key, value in updates.items():
        pattern = rf"^{re.escape(key)}:.*$"
        if re.search(pattern, content, flags=re.MULTILINE):
            content = re.sub(pattern, f"{key}: {value}", content, flags=re.MULTILINE)
        else:
            if not content.endswith("\n"):
                content += "\n"
            content += f"{key}: {value}\n"
else:
    content = f"""cff-version: 1.2.0
message: "If you use this repository, please cite it as below."
type: dataset
title: "women-made-central-asia"
version: {version}
date-released: {date}
doi: {doi}
url: "https://github.com/${{ github.repository }}"
repository-code: "https://github.com/${{ github.repository }}"
license: CC-BY-4.0
authors:
  - family-names: Abdukarimov
    given-names: Abdurashid
    orcid: "https://orcid.org/0009-0000-6394-4912"
"""

path.write_text(content, encoding="utf-8")
PY

      - name: Commit CITATION.cff
        if: steps.zenodo.outputs.doi != ''
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "chore: update CITATION.cff with DOI ${{ steps.zenodo.outputs.doi }}"
          git push
